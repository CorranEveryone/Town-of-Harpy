

name: Build Minecraft Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
          fetch-depth: 0

    - name: Compile Mod
      uses: xxanqw/compilation@v3
      
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mod-artifacts
        path: ./build/libs
